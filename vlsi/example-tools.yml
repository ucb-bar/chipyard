# Tool options. Replace with your tool plugin of choice.
vlsi.core.build_system: make
# Design Compiler options
vlsi.core.synthesis_tool: "hammer.synthesis.dc"
synthesis.dc.version: "SYN_2022.12"
synthesis.spyglass.version: "2023.12-SP1"
vlsi.core.synthesis_tool.compile_args : ["-scan", "-incremental", " -no_autoungroup" , "-no_boundary_optimization"]
vlsi.core.max_threads: 16
# Innovus options
vlsi.core.par_tool: "hammer.par.innovus"
par.innovus.version: "211"
par.innovus.design_flow_effort: "standard"
par.inputs.gds_merge: true
## Calibre options
#vlsi.core.drc_tool: "hammer.drc.calibre"
#drc.calibre.version: "2022.2_24.16"
#vlsi.core.lvs_tool: "hammer.lvs.calibre"
#lvs.calibre.version: "2022.2_24.16"
# VCS options
vlsi.core.sim_tool: "hammer.sim.vcs"
vlsi.core.fsim_tool: "hammer.fsim.vc_zoix"
vlsi.core.fsim.max_threads: 16
fsim.vc_zoix.version: "2024.09-SP1"
fsim.vc_zoix.vc_zoix_bin: "${synopsys.synopsys_home}/Z01X_${fsim.vc_zoix.version}/bin/vc_zoix"
fsim.vc_zoix.vcs_bin: "${synopsys.synopsys_home}/VCS_${sim.vcs.version}/bin/vcs"
fsim.vc_zoix.vc_fcc_bin: "${synopsys.synopsys_home}/Z01X_${fsim.vc_zoix.version}/bin/vc_fcc"
fsim.vc_zoix.vc_fcm_bin : "${synopsys.synopsys_home}/Z01X_${fsim.vc_zoix.version}/bin/vc_fcm" 
fsim.vc_zoix.vcs_home : "${synopsys.synopsys_home}/VCS_${sim.vcs.version}"
fsim.vc_zoix.verdi_home : "${synopsys.synopsys_home}/VERDI_${sim.vcs.version}"
sim.vcs.version: "2024.09-SP1"
sim.vcs.vcs_bin: "${synopsys.synopsys_home}/VCS$_{sim.vcs.version}/bin/vcs"
sim.vcs.vcs_home: "${synopsys.synopsys_home}/VCS_${sim.vcs.version}"
sim.vcs.verdi_home: "${synopsys.synopsys_home}/VERDI_${sim.vcs.version}"
vlsi.core.atpg_tool: "hammer.atpg.testmax"
atpg.testmax.version: "TMAX_2022.12"
atpg.testmax.testmax_bin: "${synopsys.testmax_home}/${atpg.testmax.version}/bin/tmax2"
# Voltus options
#vlsi.core.power_tool: "hammer.power.voltus"
#power.joules.version: "211"
#power.voltus.version: "211_ISR3"
## NOTE (about VCS+Voltus versions): if using FSDB, the VCS version should be approx 2 years older than the Voltus version for compatibility
