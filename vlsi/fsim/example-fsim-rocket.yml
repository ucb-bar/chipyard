fsim.inputs:

  # Optional execution flags for the fault simulator
  optional_execution_flags: ["+vcs+fsdbon"]


  # Determine the weights of all the parameters in the test and fault coverage
  weights: [
    {fault_class: "DC", weight: "1.0"},
    {fault_class: "PT", weight: "1.0"}
  ]

  test_coverage: "(DD * DD_weight + DT * DT_weight + DE * DE_weight + DF * DF_weight + PD * PD_weight + PT * PT_weight)/(Total)"
  fault_coverage: "(DD * DD_weight + DT * DT_weight + DE * DE_weight + DF * DF_weight + PD * PD_weight + PT * PT_weight)/(Total + UB + UI + UR + UT + UU + UO)"

  custom_coverage_functions: [
    {name: "Franout Coverage", function: "(DD * DD_weight)/(Total + UB + UI + UR + UT + UU + UO)"}
  ]

  # Determines the fault locations and types
  fault_locations: [
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.tlMasterXbar.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: False},
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.frontend.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: False},
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.icache.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: True},
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.fpuOpt.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: False},
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.dcacheArb.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: False},
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.dcache.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: True},
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.pwt.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: False},
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.core.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: False},
    {location: "ChipTop.system.tile_prci_domain.element_reset_domain_rockettile.core.csr.**", 
              fault_type: "0,1", type_of_fault_location: "PORT", exclude: True},
  ]

  # Strobe position if strobe file is not provided
  strobe_modules: [
    "`TOPLEVEL.system.tile_prci_domain.element_reset_domain_rockettile.core", 
    "`TOPLEVEL.system.tile_prci_domain.element_reset_domain_rockettile.fpuOpt"
  ]

  # Contraints for the sff file - Example on how to use
